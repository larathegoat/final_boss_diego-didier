<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Gestor de Tareas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Geist+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon"><i class="bi bi-kanban"></i></div>
      <div class="brand-text">
        <span class="brand-name">TaskFlow</span>
        <span class="brand-sub">Gestor de tareas</span>
      </div>
    </div>
    <button class="btn-new-task" id="openModal">
      <i class="bi bi-plus-lg"></i>
      Nueva tarea
    </button>
  </header>

  <!-- TOAST -->
  <div id="toastContainer"></div>

  <!-- KANBAN BOARD -->
  <main class="board-wrapper">
    <div class="board-grid">

      <!-- TO DO -->
      <div class="kanban-column" data-status="todo">
        <div class="column-header">
          <span class="column-dot dot-todo"></span>
          <span class="column-title">To Do</span>
          <span class="column-count" id="count-todo">0</span>
        </div>
        <div class="column-body" id="col-todo"
             ondragover="handleDragOver(event)"
             ondrop="handleDrop(event, 'todo')"
             ondragleave="handleDragLeave(event)">
          <div class="empty-state" id="empty-todo">
            <i class="bi bi-inbox"></i>
            <p>Sin tareas pendientes</p>
          </div>
        </div>
      </div>

      <!-- DOING -->
      <div class="kanban-column" data-status="doing">
        <div class="column-header">
          <span class="column-dot dot-doing"></span>
          <span class="column-title">Doing</span>
          <span class="column-count" id="count-doing">0</span>
        </div>
        <div class="column-body" id="col-doing"
             ondragover="handleDragOver(event)"
             ondrop="handleDrop(event, 'doing')"
             ondragleave="handleDragLeave(event)">
          <div class="empty-state" id="empty-doing">
            <i class="bi bi-activity"></i>
            <p>Nada en progreso</p>
          </div>
        </div>
      </div>

      <!-- DONE -->
      <div class="kanban-column" data-status="done">
        <div class="column-header">
          <span class="column-dot dot-done"></span>
          <span class="column-title">Done</span>
          <span class="column-count" id="count-done">0</span>
        </div>
        <div class="column-body" id="col-done"
             ondragover="handleDragOver(event)"
             ondrop="handleDrop(event, 'done')"
             ondragleave="handleDragLeave(event)">
          <div class="empty-state" id="empty-done">
            <i class="bi bi-check2-circle"></i>
            <p>Sin tareas completadas</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="app-footer">
    <span class="footer-left">TaskFlow · v1.0.0</span>
    <div class="footer-right">
      <span class="footer-stat">
        <span class="column-dot dot-todo"></span>
        To Do: <span class="stat-val" id="footer-todo">0</span>
      </span>
      <span class="footer-stat">
        <span class="column-dot dot-doing"></span>
        Doing: <span class="stat-val" id="footer-doing">0</span>
      </span>
      <span class="footer-stat">
        <span class="column-dot dot-done"></span>
        Done: <span class="stat-val" id="footer-done">0</span>
      </span>
    </div>
  </footer>

  <!-- MODAL: Nueva tarea -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-header-custom">
        <h2 class="modal-title-custom">Nueva tarea</h2>
        <button class="modal-close" id="closeModal"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="modal-body-custom">
        <div class="field-group">
          <label for="taskTitle">Título <span class="required">*</span></label>
          <input type="text" id="taskTitle" placeholder="Ej. Diseñar pantalla de login" maxlength="80" autocomplete="off"/>
          <span class="field-error" id="errorTitle"></span>
        </div>
        <div class="field-group">
          <label for="taskDesc">Descripción</label>
          <textarea id="taskDesc" placeholder="Descripción opcional..." rows="3" maxlength="300"></textarea>
        </div>
      </div>
      <div class="modal-footer-custom">
        <button class="btn-cancel" id="cancelModal">Cancelar</button>
        <button class="btn-submit" id="submitTask">
          <span id="submitText">Crear tarea</span>
          <span id="submitSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirmar eliminación -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal-card modal-small">
      <div class="modal-header-custom">
        <h2 class="modal-title-custom">Eliminar tarea</h2>
        <button class="modal-close" id="closeDelete"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="modal-body-custom">
        <p class="delete-message">¿Seguro que quieres eliminar <strong id="deleteTaskTitle"></strong>? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer-custom">
        <button class="btn-cancel" id="cancelDelete">Cancelar</button>
        <button class="btn-danger" id="confirmDelete">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
